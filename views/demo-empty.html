<!DOCTYPE html>
<html lang="zh-CN" yc-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empty 空状态 - YC UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="../styles/demo.css">
    <link rel="stylesheet" href="../styles/components/empty.css">
    <link rel="stylesheet" href="../styles/components/button.css">
</head>
<body>
    <div class="demo-container">
        <div class="demo-page-header">
            <h1 class="demo-page-title">Empty 空状态</h1>
            <p class="demo-page-subtitle">数据为空时的占位提示，支持多种场景和尺寸</p>
        </div>

        <div class="demo-section">
            <h3>基本用法</h3>
            <div class="demo-block">
                <div class="demo-block-title">简单的空状态展示</div>
                <div class="demo-row" style="flex-direction: column; gap: 12px;">
                    <div class="yc-empty">
                        <div class="yc-empty__image yc-empty__image--icon">
                            <i class="fas fa-inbox"></i>
                        </div>
                        <div class="yc-empty__description">暂无数据</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>自定义图片</h3>
            <div class="demo-block">
                <div class="demo-block-title">使用自定义图片的空状态，可添加操作按钮</div>
                <div class="demo-row" style="flex-direction: column; gap: 12px;">
                    <div class="yc-empty">
                        <div class="yc-empty__image">
                            <svg viewBox="0 0 160 160" width="160" height="160">
                                <circle cx="80" cy="80" r="60" fill="#F4F4F5" />
                                <path fill="#DCDFE6" d="M60 70h40v60H60z" />
                                <path fill="#C0C4CC" d="M55 60h50v10H55z" />
                                <circle cx="100" cy="55" r="8" fill="#909399" />
                            </svg>
                        </div>
                        <div class="yc-empty__description">暂无相关数据</div>
                        <div class="yc-empty__actions">
                            <button class="yc-button yc-button--primary">刷新页面</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>不同场景</h3>
            <div class="demo-block">
                <div class="demo-block-title">适用于不同业务场景的空状态提示</div>
                <div class="yc-empty-scenarios">
                    <div class="yc-empty-scenario">
                        <div class="yc-empty yc-empty--error">
                            <div class="yc-empty__image yc-empty__image--icon">
                                <i class="fas fa-exclamation-circle"></i>
                            </div>
                            <div class="yc-empty__description">加载失败，请检查网络连接</div>
                            <div class="yc-empty__actions">
                                <button class="yc-button yc-button--small yc-button--primary">重试</button>
                                <button class="yc-button yc-button--small">返回首页</button>
                            </div>
                        </div>
                        <div class="yc-empty__label">加载失败</div>
                    </div>

                    <div class="yc-empty-scenario">
                        <div class="yc-empty yc-empty--success">
                            <div class="yc-empty__image yc-empty__image--icon">
                                <i class="fas fa-check-circle"></i>
                            </div>
                            <div class="yc-empty__description">暂无待处理事项</div>
                        </div>
                        <div class="yc-empty__label">操作成功</div>
                    </div>

                    <div class="yc-empty-scenario">
                        <div class="yc-empty yc-empty--no-search">
                            <div class="yc-empty__image yc-empty__image--icon">
                                <i class="fas fa-search"></i>
                            </div>
                            <div class="yc-empty__description">未找到匹配的结果</div>
                            <div class="yc-empty__actions">
                                <button class="yc-button yc-button--small">清除搜索</button>
                            </div>
                        </div>
                        <div class="yc-empty__label">无搜索结果</div>
                    </div>

                    <div class="yc-empty-scenario">
                        <div class="yc-empty yc-empty--no-order">
                            <div class="yc-empty__image yc-empty__image--icon">
                                <i class="fas fa-shopping-cart"></i>
                            </div>
                            <div class="yc-empty__description">还没有任何订单</div>
                            <div class="yc-empty__actions">
                                <button class="yc-button yc-button--small yc-button--primary">去购物</button>
                            </div>
                        </div>
                        <div class="yc-empty__label">暂无订单</div>
                    </div>

                    <div class="yc-empty-scenario">
                        <div class="yc-empty yc-empty--no-permission">
                            <div class="yc-empty__image yc-empty__image--icon">
                                <i class="fas fa-lock"></i>
                            </div>
                            <div class="yc-empty__description">您没有访问该内容的权限</div>
                            <div class="yc-empty__actions">
                                <button class="yc-button yc-button--small">申请权限</button>
                            </div>
                        </div>
                        <div class="yc-empty__label">无权限</div>
                    </div>

                    <div class="yc-empty-scenario">
                        <div class="yc-empty yc-empty--no-network">
                            <div class="yc-empty__image yc-empty__image--icon">
                                <i class="fas fa-wifi"></i>
                            </div>
                            <div class="yc-empty__description">网络连接已断开</div>
                            <div class="yc-empty__actions">
                                <button class="yc-button yc-button--small yc-button--primary">重新连接</button>
                            </div>
                        </div>
                        <div class="yc-empty__label">网络异常</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>不同尺寸</h3>
            <div class="demo-block">
                <div class="demo-block-title">提供大、默认、小三种尺寸</div>
                <div class="demo-row" style="flex-direction: column; gap: 32px;">
                    <div class="yc-empty yc-empty--large">
                        <div class="yc-empty__image yc-empty__image--icon">
                            <i class="fas fa-folder-open"></i>
                        </div>
                        <div class="yc-empty__description">大尺寸空状态，适用于主要内容区域</div>
                    </div>

                    <div class="yc-empty">
                        <div class="yc-empty__image yc-empty__image--icon">
                            <i class="fas fa-folder-open"></i>
                        </div>
                        <div class="yc-empty__description">默认尺寸空状态，适用于一般容器</div>
                    </div>

                    <div class="yc-empty yc-empty--small">
                        <div class="yc-empty__image yc-empty__image--icon">
                            <i class="fas fa-folder-open"></i>
                        </div>
                        <div class="yc-empty__description">小尺寸空状态</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>卡片内空状态</h3>
            <div class="demo-block">
                <div class="demo-block-title">适用于表格、列表等容器内的空状态</div>
                <div class="demo-row" style="flex-direction: column; gap: 12px;">
                    <div class="yc-empty yc-empty--in-card">
                        <div class="yc-empty__image yc-empty__image--icon">
                            <i class="fas fa-table"></i>
                        </div>
                        <div class="yc-empty__description">暂无数据记录</div>
                        <div class="yc-empty__actions">
                            <button class="yc-button yc-button--primary">创建数据</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
