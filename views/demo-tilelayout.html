<!DOCTYPE html>
<html lang="zh-CN" yc-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TileLayout 瓦片布局组件示例 - YC UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="../styles/demo.css">
</head>
<body>
    <div class="demo-container">
        <div class="demo-page-header">
            <h1 class="demo-page-title">TileLayout 瓦片布局</h1>
            <p class="demo-page-subtitle">灵活的网格布局系统，支持不同尺寸的瓦片组合</p>
        </div>

        <div class="demo-section">
            <h3>基本用法</h3>
            <div class="demo-block">
                <div class="demo-block-title">不同尺寸的瓦片组合</div>
                <div class="demo-row">
                    <div id="basic-tilelayout" class="yc-tilelayout"></div>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>自定义瓦片</h3>
            <div class="demo-block">
                <div class="demo-block-title">支持自定义背景颜色</div>
                <div class="demo-row">
                    <div id="custom-tilelayout" class="yc-tilelayout"></div>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>响应式布局</h3>
            <div class="demo-block">
                <div class="demo-block-title">自适应不同屏幕尺寸</div>
                <div class="demo-row">
                    <div id="responsive-tilelayout" class="yc-tilelayout yc-tilelayout-responsive"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class TileLayout {
            constructor(options) {
                if (options.container instanceof HTMLElement) {
                    this.container = options.container;
                } else {
                    this.container = document.querySelector(options.container);
                }
                this.tiles = options.tiles || [];
                this.gutter = options.gutter || 10;

                this.init();
            }

            init() {
                this.container.innerHTML = '';
                this.container.className = 'yc-tilelayout';

                for (var i = 0; i < this.tiles.length; i++) {
                    this.createTile(i);
                }
            }

            createTile(index) {
                var tile = this.tiles[index];
                var size = tile.size || '1x1';
                var sizeParts = size.split('x').map(Number);
                var width = sizeParts[0];
                var height = sizeParts[1];

                var tileEl = document.createElement('div');
                tileEl.className = 'yc-tilelayout-tile';
                tileEl.style.gridColumn = 'span ' + width;
                tileEl.style.gridRow = 'span ' + height;

                if (tile.backgroundColor) {
                    tileEl.style.backgroundColor = tile.backgroundColor;
                }

                if (tile.title) {
                    var header = document.createElement('div');
                    header.className = 'yc-tilelayout-tile-header';
                    header.textContent = tile.title;
                    tileEl.appendChild(header);
                }

                var content = document.createElement('div');
                content.className = 'yc-tilelayout-tile-content';

                if (typeof tile.content === 'function') {
                    var result = tile.content();
                    if (result instanceof HTMLElement) {
                        content.appendChild(result);
                    } else if (typeof result === 'string') {
                        content.innerHTML = result;
                    }
                } else {
                    content.innerHTML = tile.content;
                }

                tileEl.appendChild(content);
                this.container.appendChild(tileEl);
            }

            addTile(tile) {
                this.tiles.push(tile);
                this.init();
            }

            removeTile(index) {
                if (index < 0 || index >= this.tiles.length) return;

                this.tiles.splice(index, 1);
                this.init();
            }

            getTiles() {
                return this.tiles;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            var basicTileLayout = new TileLayout({
                container: '#basic-tilelayout',
                tiles: [
                    {
                        title: '瓦片1',
                        content: '瓦片1的内容',
                        size: '1x1'
                    },
                    {
                        title: '瓦片2',
                        content: '瓦片2的内容',
                        size: '2x1'
                    },
                    {
                        title: '瓦片3',
                        content: '瓦片3的内容',
                        size: '1x2'
                    },
                    {
                        title: '瓦片4',
                        content: '瓦片4的内容',
                        size: '2x2'
                    }
                ]
            });

            var customTileLayout = new TileLayout({
                container: '#custom-tilelayout',
                tiles: [
                    {
                        title: '自定义瓦片1',
                        content: function() {
                            var content = document.createElement('div');
                            content.innerHTML = '<p>这是一个自定义内容的瓦片</p><button class="yc-button yc-button--small yc-button--primary">点击</button>';
                            return content;
                        },
                        size: '1x1',
                        backgroundColor: '#e3f2fd'
                    },
                    {
                        title: '自定义瓦片2',
                        content: '瓦片2的内容',
                        size: '2x1',
                        backgroundColor: '#e8f5e8'
                    },
                    {
                        title: '自定义瓦片3',
                        content: '瓦片3的内容',
                        size: '1x2',
                        backgroundColor: '#fff3e0'
                    },
                    {
                        title: '自定义瓦片4',
                        content: '瓦片4的内容',
                        size: '2x2',
                        backgroundColor: '#f3e5f5'
                    }
                ]
            });

            var responsiveTileLayout = new TileLayout({
                container: '#responsive-tilelayout',
                tiles: [
                    {
                        title: '瓦片1',
                        content: '瓦片1的内容',
                        size: '1x1'
                    },
                    {
                        title: '瓦片2',
                        content: '瓦片2的内容',
                        size: '1x1'
                    },
                    {
                        title: '瓦片3',
                        content: '瓦片3的内容',
                        size: '1x1'
                    },
                    {
                        title: '瓦片4',
                        content: '瓦片4的内容',
                        size: '1x1'
                    },
                    {
                        title: '瓦片5',
                        content: '瓦片5的内容',
                        size: '1x1'
                    },
                    {
                        title: '瓦片6',
                        content: '瓦片6的内容',
                        size: '1x1'
                    }
                ]
            });
        });
    </script>
</body>
</html>
