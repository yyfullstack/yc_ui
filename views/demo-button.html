            <div class="demo-row">

                <button class="yc-button yc-button--primary yc-button--dashed">主要虚线</button>
                <button class="yc-button yc-button--success yc-button--dashed">成功虚线</button>

        <div class="demo-section">
            <h3>加载状态</h3>
            <div class="demo-row">
                <button class="yc-button yc-button--primary yc-button--loading" id="loadingBtn1" onclick="toggleLoading('loadingBtn1')">
                    <i class="fas fa-spinner fa-spin"></i>
                    加载中...
                </button>
                <button class="yc-button yc-button--success yc-button--loading" id="loadingBtn2" onclick="toggleLoading('loadingBtn2')">
                    <i class="fas fa-spinner fa-spin"></i>
                    加载完成
                </button>
                <button class="yc-button yc-button--warning yc-button--loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    处理中
                </button>
                <button class="yc-button yc-button--danger" disabled>
                    <i class="fas fa-spinner fa-spin"></i>
                    加载中
                </button>
            </div>
        </div>

        <div class="demo-section">
            <h3>按钮组</h3>
            <div class="demo-block">
                <div class="demo-block-title">基本按钮组</div>
                <div class="demo-row">
                    <div class="yc-button-group">
                        <button class="yc-button">按钮一</button>
                        <button class="yc-button">按钮二</button>
                        <button class="yc-button">按钮三</button>
                    </div>
                </div>
            </div>

            <div class="demo-divider"></div>

            <div class="demo-block">
                <div class="demo-block-title">带颜色按钮组</div>
                <div class="demo-row">
                    <div class="yc-button-group">
                        <button class="yc-button yc-button--primary">北京</button>
                        <button class="yc-button yc-button--primary">上海</button>
                        <button class="yc-button yc-button--primary">广州</button>
                        <button class="yc-button yc-button--primary">深圳</button>
                    </div>
                </div>
                <div class="demo-row" style="margin-top: 12px;">
                    <div class="yc-button-group">
                        <button class="yc-button yc-button--success">
                            <i class="fas fa-check"></i>
                            确定
                        </button>
                        <button class="yc-button yc-button--danger">
                            <i class="fas fa-times"></i>

                    </div>

            </div>

            <div class="demo-divider"></div>

                <div class="demo-row">
                    <div class="yc-button-group">
                        <button class="yc-button yc-button--primary">
                            <i class="fas fa-align-left"></i>
                        </button>

                        </button>
                        <button class="yc-button yc-button--primary">
                            <i class="fas fa-align-right"></i>

            <div class="demo-divider"></div>

                        <button class="yc-button yc-button--success">
                            <i class="fas fa-share"></i>

        <div class="demo-section">
            <h3>事件处理</h3>
            <div class="demo-row">
                <button class="yc-button yc-button--primary" onclick="handleClick(this)">
                    <i class="fas fa-hand-pointer"></i>
                    点击我
                </button>
                <button class="yc-button yc-button--success" onclick="handleClick(this)">
                    <i class="fas fa-check-circle"></i>
                    成功提示
                </button>
                <button class="yc-button yc-button--warning" onclick="handleClick(this)">
                    <i class="fas fa-exclamation-triangle"></i>
                    警告提示
                </button>
                <button class="yc-button yc-button--danger" onclick="handleClick(this)">
                    <i class="fas fa-times-circle"></i>
                    错误提示
                </button>
            </div>
            <div class="demo-result" id="clickResult">状态：等待点击</div>
        </div>

        <div class="demo-section">
            <h3>自定义颜色</h3>
            <div class="demo-row">
                <button class="yc-button" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-color: #764ba2; color: white;">
                    渐变紫
                </button>
                <button class="yc-button" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-color: #f5576c; color: white;">
                    渐变粉
                </button>
                <button class="yc-button" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); border-color: #00f2fe; color: white;">
                    渐变蓝
                </button>
                <button class="yc-button" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); border-color: #38f9d7; color: white;">
                    渐变绿
                </button>
                <button class="yc-button" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); border-color: #fee140; color: #333;">
                    渐变橙
                </button>
            </div>
        </div>
    </div>

    <script>
        function handleClick(btn) {
            const resultEl = document.getElementById('clickResult');
            const text = btn.textContent.trim();

            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = '';
            }, 100);

            const messages = {
                '点击我': '已点击：触发了一个普通操作',
                '成功提示': '已点击：操作成功完成！',
                '警告提示': '已点击：这是一个警告信息',
                '错误提示': '已点击：操作过程中发生错误'
            };

            if (messages[text]) {
                resultEl.textContent = `状态：${messages[text]}`;
            }
        }

        function toggleLoading(btnId) {
            const btn = document.getElementById(btnId);
            if (!btn) return;

            const isLoading = btn.classList.contains('yc-button--loading');

            if (isLoading) {
                btn.classList.remove('yc-button--loading');
                btn.innerHTML = '<i class="fas fa-check"></i> 加载完成';
            } else {
                btn.classList.add('yc-button--loading');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 加载中...';
            }
        }
    </script>
