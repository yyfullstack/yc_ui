<!DOCTYPE html>
<html lang="zh-CN" yc-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link 文字链接 - YC UI</title>
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="../styles/demo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="demo-container">
        <div class="demo-page-header">
            <h1 class="demo-page-header__title">Link 文字链接</h1>
            <p class="demo-page-header__desc">文本超链接，提供多种样式和状态。</p>
        </div>

        <div class="demo-section">
            <h2 class="demo-section__title">基础链接</h2>
            <p class="demo-section__desc">最基础的文字链接。</p>
            <div class="demo-block">
                <div class="yc-space">
                    <a href="#" class="yc-link">默认链接</a>
                    <a href="#" class="yc-link yc-link--primary">主要链接</a>
                    <a href="#" class="yc-link yc-link--success">成功链接</a>
                    <a href="#" class="yc-link yc-link--warning">警告链接</a>
                    <a href="#" class="yc-link yc-link--danger">危险链接</a>
                    <a href="#" class="yc-link yc-link--info">信息链接</a>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h2 class="demo-section__title">下划线样式</h2>
            <p class="demo-section__desc">控制下划线的显示时机。</p>
            <div class="demo-block">
                <div class="yc-space">
                    <a href="#" class="yc-link yc-link--underline-hover">Hover 显示下划线</a>
                    <a href="#" class="yc-link yc-link--underline-always">始终显示下划线</a>
                    <a href="#" class="yc-link yc-link--underline-none">不显示下划线</a>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h2 class="demo-section__title">尺寸</h2>
            <p class="demo-section__desc">不同尺寸的文字链接。</p>
            <div class="demo-block">
                <div class="yc-space" style="align-items: center;">
                    <a href="#" class="yc-link yc-link--small">小尺寸</a>
                    <a href="#" class="yc-link yc-link--medium">中等尺寸</a>
                    <a href="#" class="yc-link yc-link--large">大尺寸</a>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h2 class="demo-section__title">带图标</h2>
            <p class="demo-section__desc">可以在链接中添加图标。</p>
            <div class="demo-block">
                <div class="yc-space">
                    <a href="#" class="yc-link yc-link--primary">
                        <i class="fas fa-home yc-link__icon"></i>
                        首页
                    </a>
                    <a href="#" class="yc-link yc-link--success">
                        了解更多
                        <i class="fas fa-arrow-right yc-link__icon yc-link__icon--arrow-right"></i>
                    </a>
                    <a href="#" class="yc-link yc-link--info">
                        <i class="fas fa-arrow-left yc-link__icon yc-link__icon--arrow-left"></i>
                        返回
                    </a>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h2 class="demo-section__title">禁用状态</h2>
            <p class="demo-section__desc">链接可以设置为禁用状态。</p>
            <div class="demo-block">
                <div class="yc-space">
                    <a href="#" class="yc-link yc-link--disabled">默认禁用</a>
                    <a href="#" class="yc-link yc-link--primary yc-link--disabled">主要禁用</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
