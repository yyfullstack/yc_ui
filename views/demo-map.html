<!DOCTYPE html>
<html lang="zh-CN" yc-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map 地图 - YC UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="../styles/demo.css">
    <style>
        .demo-map-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        .demo-section {
            margin-bottom: 32px;
        }
        .demo-section__title {
            font-size: 18px;
            font-weight: 600;
            color: var(--yc-color-text-primary);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--yc-color-border-light);
        }
    </style>
</head>
<body>
    <div class="yc-demo-layout">
        <header class="yc-demo-header">
            <div class="yc-demo-header__logo">
                <a href="../index.html">
                    <i class="fas fa-palette"></i>
                    <span>YC UI</span>
                </a>
            </div>
            <nav class="yc-demo-header__nav">
                <a href="../index.html" class="yc-demo-header__nav-item">首页</a>
                <span class="yc-demo-header__nav-item is-active">Map 地图</span>
            </nav>
        </header>

        <div class="demo-map-container">
            <section class="demo-section">
                <h2 class="demo-section__title">基础地图</h2>
                <div class="yc-map">
                    <div class="yc-map__container">
                        <div class="yc-map__viewport">
                            <div class="yc-map__canvas">
                                <svg class="yc-map__svg" viewBox="0 0 800 500">
                                    <!-- 简化版中国地图轮廓 -->
                                    <path class="yc-map__region" d="M 200,100 L 300,80 L 400,90 L 500,110 L 550,150 L 580,200 L 600,280 L 580,350 L 520,400 L 450,420 L 350,430 L 280,400 L 220,350 L 180,280 L 160,200 L 170,140 Z" />
                                    
                                    <!-- 标记点 -->
                                    <circle class="yc-map__heatmap-point" cx="400" cy="200" r="8" fill="#409eff" />
                                    <circle class="yc-map__heatmap-point" cx="320" cy="180" r="6" fill="#67c23a" />
                                    <circle class="yc-map__heatmap-point" cx="480" cy="250" r="10" fill="#e6a23c" />
                                    <circle class="yc-map__heatmap-point" cx="350" cy="280" r="5" fill="#f56c6c" />
                                    <circle class="yc-map__heatmap-point" cx="280" cy="220" r="7" fill="#409eff" />
                                    
                                    <!-- 连线 -->
                                    <path class="yc-map__route" d="M 400,200 L 320,180 L 280,220" />
                                    <path class="yc-map__route" d="M 400,200 L 480,250" />
                                    <path class="yc-map__route" d="M 350,280 L 400,200" />
                                </svg>
                            </div>

                            <!-- 标记 -->
                            <div class="yc-map__marker" style="left: 50%; top: 40%;">
                                <svg class="yc-map__marker-pin" viewBox="0 0 32 40">
                                    <path class="yc-map__marker-pin--primary" d="M16 0C7.16 0 0 7.16 0 16c0 12 16 24 16 24s16-12 16-24c0-8.84-7.16-16-16-16zm0 22c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z" />
                                </svg>
                                <i class="fas fa-star yc-map__marker-icon"></i>
                                <div class="yc-map__marker-label">北京市</div>
                            </div>

                            <div class="yc-map__marker" style="left: 40%; top: 36%;">
                                <svg class="yc-map__marker-pin" viewBox="0 0 32 40">
                                    <path class="yc-map__marker-pin--success" d="M16 0C7.16 0 0 7.16 0 16c0 12 16 24 16 24s16-12 16-24c0-8.84-7.16-16-16-16zm0 22c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z" />
                                </svg>
                                <i class="fas fa-building yc-map__marker-icon"></i>
                                <div class="yc-map__marker-label">上海市</div>
                            </div>

                            <div class="yc-map__marker" style="left: 60%; top: 50%;">
                                <svg class="yc-map__marker-pin" viewBox="0 0 32 40">
                                    <path class="yc-map__marker-pin--warning" d="M16 0C7.16 0 0 7.16 0 16c0 12 16 24 16 24s16-12 16-24c0-8.84-7.16-16-16-16zm0 22c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z" />
                                </svg>
                                <i class="fas fa-map-marker-alt yc-map__marker-icon"></i>
                                <div class="yc-map__marker-label yc-map__marker-label is-always-show">广州市</div>
                            </div>

                            <div class="yc-map__marker" style="left: 44%; top: 56%;">
                                <svg class="yc-map__marker-pin" viewBox="0 0 32 40">
                                    <path class="yc-map__marker-pin--danger" d="M16 0C7.16 0 0 7.16 0 16c0 12 16 24 16 24s16-12 16-24c0-8.84-7.16-16-16-16zm0 22c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z" />
                                </svg>
                                <i class="fas fa-exclamation-triangle yc-map__marker-icon"></i>
                                <div class="yc-map__marker-label">成都市</div>
                            </div>

                            <div class="yc-map__marker" style="left: 35%; top: 44%;">
                                <svg class="yc-map__marker-pin" viewBox="0 0 32 40">
                                    <path class="yc-map__marker-pin--info" d="M16 0C7.16 0 0 7.16 0 16c0 12 16 24 16 24s16-12 16-24c0-8.84-7.16-16-16-16zm0 22c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z" />
                                </svg>
                                <i class="fas fa-home yc-map__marker-icon"></i>
                                <div class="yc-map__marker-label">西安市</div>
                            </div>
                        </div>

                        <!-- 搜索 -->
                        <div class="yc-map__search">
                            <i class="fas fa-search yc-map__search-icon"></i>
                            <input type="text" class="yc-map__search-input" placeholder="搜索地点...">
                            <div class="yc-map__search-results" id="searchResults">
                                <div class="yc-map__search-result-item">北京市</div>
                                <div class="yc-map__search-result-item">上海市</div>
                                <div class="yc-map__search-result-item">广州市</div>
                                <div class="yc-map__search-result-item">深圳市</div>
                            </div>
                        </div>

                        <!-- 控制按钮 -->
                        <div class="yc-map__controls">
                            <div class="yc-map__control-group">
                                <button class="yc-map__control-btn" title="放大"><i class="fas fa-plus"></i></button>
                                <button class="yc-map__control-btn" title="缩小"><i class="fas fa-minus"></i></button>
                                <button class="yc-map__control-btn" title="适应视图"><i class="fas fa-expand"></i></button>
                            </div>
                            <div class="yc-map__control-group">
                                <button class="yc-map__control-btn" title="图层"><i class="fas fa-layer-group"></i></button>
                                <button class="yc-map__control-btn" title="测量"><i class="fas fa-ruler"></i></button>
                                <button class="yc-map__control-btn" title="截图"><i class="fas fa-camera"></i></button>
                            </div>
                        </div>

                        <!-- 图例 -->
                        <div class="yc-map__legend">
                            <div class="yc-map__legend-title">图例</div>
                            <div class="yc-map__legend-item">
                                <div class="yc-map__legend-color" style="background-color: #409eff;"></div>
                                <span>主要城市</span>
                            </div>
                            <div class="yc-map__legend-item">
                                <div class="yc-map__legend-color" style="background-color: #67c23a;"></div>
                                <span>分支机构</span>
                            </div>
                            <div class="yc-map__legend-item">
                                <div class="yc-map__legend-color" style="background-color: #e6a23c;"></div>
                                <span>重点区域</span>
                            </div>
                            <div class="yc-map__legend-item">
                                <div class="yc-map__legend-color" style="background-color: #f56c6c;"></div>
                                <span>告警区域</span>
                            </div>
                        </div>

                        <!-- 缩放信息 -->
                        <div class="yc-map__zoom-info">缩放: 100%</div>
                    </div>
                </div>
            </section>

            <section class="demo-section">
                <h2 class="demo-section__title">标记点信息</h2>
                <div class="yc-space yc-space--vertical" style="gap: 16px;">
                    <div style="display: flex; gap: 24px; flex-wrap: wrap;">
                        <div class="yc-card" style="padding: 16px; flex: 1; min-width: 200px;">
                            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                                <i class="fas fa-star" style="color: #409eff;"></i>
                                <strong>北京市</strong>
                            </div>
                            <p style="font-size: 12px; color: var(--yc-color-text-secondary);">
                                首都，政治、文化中心<br>
                                人口: 2100万<br>
                                GDP: 4.03万亿元
                            </p>
                        </div>
                        <div class="yc-card" style="padding: 16px; flex: 1; min-width: 200px;">
                            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                                <i class="fas fa-building" style="color: #67c23a;"></i>
                                <strong>上海市</strong>
                            </div>
                            <p style="font-size: 12px; color: var(--yc-color-text-secondary);">
                                经济中心，金融中心<br>
                                人口: 2400万<br>
                                GDP: 4.32万亿元
                            </p>
                        </div>
                        <div class="yc-card" style="padding: 16px; flex: 1; min-width: 200px;">
                            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                                <i class="fas fa-map-marker-alt" style="color: #e6a23c;"></i>
                                <strong>广州市</strong>
                            </div>
                            <p style="font-size: 12px; color: var(--yc-color-text-secondary);">
                                南方门户，贸易中心<br>
                                人口: 1500万<br>
                                GDP: 2.82万亿元
                            </p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const searchInput = document.querySelector('.yc-map__search-input');
        const searchResults = document.getElementById('searchResults');

        if (searchInput && searchResults) {
            searchInput.addEventListener('focus', function() {
                if (this.value.length > 0) {
                    searchResults.classList.add('is-visible');
                }
            });

            searchInput.addEventListener('input', function() {
                if (this.value.length > 0) {
                    searchResults.classList.add('is-visible');
                } else {
                    searchResults.classList.remove('is-visible');
                }
            });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.yc-map__search')) {
                    searchResults.classList.remove('is-visible');
                }
            });

            searchResults.querySelectorAll('.yc-map__search-result-item').forEach(item => {
                item.addEventListener('click', function() {
                    searchInput.value = this.textContent;
                    searchResults.classList.remove('is-visible');
                });
            });
        }

        document.querySelectorAll('.yc-map__marker').forEach(marker => {
            marker.addEventListener('click', function() {
                document.querySelectorAll('.yc-map__marker').forEach(m => {
                    m.style.zIndex = '10';
                });
                this.style.zIndex = '30';
            });
        });

        document.querySelectorAll('.yc-map__control-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                console.log('控制按钮点击:', this.title);
            });
        });
    </script>
</body>
</html>
