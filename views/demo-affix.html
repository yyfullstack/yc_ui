<!DOCTYPE html>
<html lang="zh-CN" yc-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affix 固钉 - YC UI</title>
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="../styles/demo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="demo-container">
        <div class="demo-page-header">
            <h1 class="demo-page-header__title">Affix 固钉</h1>
            <p class="demo-page-header__desc">将页面元素固定在特定可视区域位置，滚动时保持可见。</p>
        </div>

        <div class="demo-section">
            <h2 class="demo-section__title">基础用法</h2>
            <p class="demo-section__desc">最简单的固钉用法，固定在顶部。</p>
            <div class="demo-block">
                <div id="affix-top" class="yc-affix yc-affix--top">
                    <div class="yc-affix__content">
                        <button class="yc-button yc-button--primary" style="margin: 12px;">固定在顶部</button>
                    </div>
                </div>
                <div style="height: 300px; background: var(--yc-color-bg-page); margin: 20px 0; display: flex; align-items: center; justify-content: center;">
                    <p class="yc-text-regular yc-text-secondary">向上滚动查看效果</p>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h2 class="demo-section__title">偏移距离</h2>
            <p class="demo-section__desc">通过设置 offset 属性来改变固定距离，默认值为 0。</p>
            <div class="demo-block">
                <div id="affix-offset" class="yc-affix yc-affix--top" data-offset="120">
                    <div class="yc-affix__content">
                        <button class="yc-button yc-button--primary" style="margin: 12px;">偏移 120px</button>
                    </div>
                </div>
                <div style="height: 500px; background: var(--yc-color-bg-page); margin: 20px 0; display: flex; align-items: center; justify-content: center;">
                    <p class="yc-text-regular yc-text-secondary">向上滚动查看偏移效果</p>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h2 class="demo-section__title">固定位置</h2>
            <p class="demo-section__desc">Affix 组件提供两种固定位置：top 和 bottom。</p>
            <div class="demo-block">
                <div id="affix-top-demo" class="yc-affix yc-affix--top" data-offset="60">
                    <div class="yc-affix__content">
                        <div style="padding: 12px 24px; background: var(--yc-color-primary); color: white; border-radius: var(--yc-border-radius-base);">
                            <i class="fas fa-thumbtack"></i> 顶部固定
                        </div>
                    </div>
                </div>
                <div id="affix-bottom-demo" class="yc-affix yc-affix--bottom" data-offset="60">
                    <div class="yc-affix__content">
                        <div style="padding: 12px 24px; background: var(--yc-color-success); color: white; border-radius: var(--yc-border-radius-base);">
                            <i class="fas fa-thumbtack"></i> 底部固定
                        </div>
                    </div>
                </div>
                <div style="height: 800px;"></div>
            </div>
        </div>

        <div class="demo-section">
            <h2 class="demo-section__title">指定容器</h2>
            <p class="demo-section__desc">可以设置 target 属性让固钉在特定容器内固定，超出范围时隐藏。</p>
            <div class="demo-block">
                <div id="affix-container" class="demo-affix-container">
                    <div style="height: 200px;"></div>
                    <div id="affix-inner" class="yc-affix yc-affix--top" data-offset="20">
                        <div class="yc-affix__content">
                            <div style="padding: 8px 16px; background: var(--yc-color-primary-light-9); border-radius: var(--yc-border-radius-sm); color: var(--yc-color-primary);">
                                <i class="fas fa-thumbtack"></i> 在容器内固定
                            </div>
                        </div>
                    </div>
                    <div style="height: 800px;"></div>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h2 class="demo-section__title">固定导航栏</h2>
            <p class="demo-section__desc">常见的应用场景是固定导航栏。</p>
            <div class="demo-block">
                <div id="affix-nav" class="yc-affix yc-affix--top" data-offset="0">
                    <div class="yc-affix__content">
                        <nav class="demo-affix-nav">
                            <a href="#" class="demo-affix-nav__item is-active">首页</a>
                            <a href="#" class="demo-affix-nav__item">文档</a>
                            <a href="#" class="demo-affix-nav__item">组件</a>
                            <a href="#" class="demo-affix-nav__item">示例</a>
                            <a href="#" class="demo-affix-nav__item">关于</a>
                        </nav>
                    </div>
                </div>
                <div style="height: 500px; background: var(--yc-color-bg-page); margin: 20px 0; display: flex; align-items: center; justify-content: center;">
                    <p class="yc-text-regular yc-text-secondary">向上滚动查看导航栏固定效果</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        class Affix {
            constructor(element, options = {}) {
                this.element = element;
                this.content = element.querySelector('.yc-affix__content');
                this.options = Object.assign({
                    offset: parseInt(element.dataset.offset) || 0,
                    position: element.classList.contains('yc-affix--bottom') ? 'bottom' : 'top',
                    target: null
                }, options);

                this.placeholder = null;
                this.isFixed = false;
                this.targetRect = null;

                this.init();
            }

            init() {
                this.createPlaceholder();
                this.bindEvents();
                this.update();
            }

            createPlaceholder() {
                this.placeholder = document.createElement('div');
                this.placeholder.className = 'yc-affix__placeholder';
                this.placeholder.style.width = this.element.offsetWidth + 'px';
                this.placeholder.style.height = this.element.offsetHeight + 'px';
                this.placeholder.style.display = 'none';
                this.element.parentNode.insertBefore(this.placeholder, this.element);
            }

            bindEvents() {
                if (this.options.target) {
                    const targetEl = typeof this.options.target === 'string'
                        ? document.querySelector(this.options.target)
                        : this.options.target;

                    if (targetEl) {
                        this.targetEl = targetEl;
                        this.targetEl.addEventListener('scroll', () => this.update());
                    }
                } else {
                    window.addEventListener('scroll', () => this.update());
                    window.addEventListener('resize', () => {
                        this.updatePlaceholderSize();
                        this.update();
                    });
                }
            }

            update() {
                const scrollEl = this.targetEl || window;
                const scrollTop = this.targetEl ? this.targetEl.scrollTop : window.scrollY;
                const elementTop = this.getElementTop();
                const shouldBeFixed = this.position === 'top'
                    ? scrollTop >= elementTop - this.offset
                    : scrollTop <= elementTop - this.offset;

                if (this.isInContainer()) {
                    if (shouldBeFixed && !this.isFixed) {
                        this.fix();
                    } else if (!shouldBeFixed && this.isFixed) {
                        this.unfix();
                    }
                } else {
                    this.hide();
                }
            }

            getElementTop() {
                if (this.targetEl) {
                    return this.element.offsetTop;
                }
                return this.element.getBoundingClientRect().top + window.scrollY;
            }

            isInContainer() {
                if (!this.targetEl) return true;

                const containerRect = this.targetEl.getBoundingClientRect();
                const elementRect = this.element.getBoundingClientRect();

                return elementRect.top >= containerRect.top &&
                       elementRect.bottom <= containerRect.bottom;
            }

            fix() {
                this.isFixed = true;
                this.element.classList.add('is-fixed');
                this.placeholder.style.display = 'block';

                const positionStyle = this.position === 'top'
                    ? { top: this.offset + 'px' }
                    : { bottom: this.offset + 'px' };

                Object.assign(this.element.style, positionStyle);

                this.element.dispatchEvent(new CustomEvent('affix-change', {
                    detail: { fixed: true }
                }));
            }

            unfix() {
                this.isFixed = false;
                this.element.classList.remove('is-fixed');
                this.placeholder.style.display = 'none';

                if (this.position === 'top') {
                    this.element.style.top = '';
                } else {
                    this.element.style.bottom = '';
                }

                this.element.dispatchEvent(new CustomEvent('affix-change', {
                    detail: { fixed: false }
                }));
            }

            hide() {
                this.element.style.display = 'none';
            }

            show() {
                this.element.style.display = '';
            }

            updatePlaceholderSize() {
                this.placeholder.style.width = this.element.offsetWidth + 'px';
                this.placeholder.style.height = this.element.offsetHeight + 'px';
            }

            destroy() {
                if (this.targetEl) {
                    this.targetEl.removeEventListener('scroll', () => this.update());
                } else {
                    window.removeEventListener('scroll', () => this.update());
                    window.removeEventListener('resize', () => this.update());
                }
                this.placeholder?.remove();
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const affixInstances = [];

            document.querySelectorAll('.yc-affix').forEach(el => {
                const options = {
                    offset: parseInt(el.dataset.offset) || 0
                };

                if (el.dataset.target) {
                    options.target = el.dataset.target;
                }

                affixInstances.push(new Affix(el, options));
            });

            const container = document.getElementById('affix-container');
            const affixInner = document.getElementById('affix-inner');

            if (container && affixInner) {
                const innerAffix = new Affix(affixInner, {
                    target: container,
                    offset: parseInt(affixInner.dataset.offset) || 0
                });

                container.addEventListener('scroll', () => {
                    const scrollTop = container.scrollTop;
                    const containerHeight = container.offsetHeight;
                    const contentHeight = container.scrollHeight;

                    if (scrollTop + containerHeight >= contentHeight - 20) {
                        innerAffix.hide();
                    } else {
                        innerAffix.show();
                        innerAffix.update();
                    }
                });
            }

            affixInstances.forEach(instance => {
                instance.element.addEventListener('affix-change', (e) => {
                    console.log('Affix 状态变化:', e.detail);
                });
            });
        });
    </script>
</body>
</html>
