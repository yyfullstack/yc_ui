        <div class="demo-section">

            <div class="demo-block">

                    <button class="yc-button yc-button--primary" onclick="resetColorPicker()">
                        <i class="fas fa-sync-alt"></i> 重置颜色
                    </button>

    <script>
        class ColorUtils {
            static hsvToRgb(h, s, v) {
                let r, g, b;
                const i = Math.floor(h * 6);
                const f = h * 6 - i;
                const p = v * (1 - s);
                const q = v * (1 - f * s);
                const t = v * (1 - (1 - f) * s);
                switch (i % 6) {
                    case 0: r = v; g = t; b = p; break;
                    case 1: r = q; g = v; b = p; break;
                    case 2: r = p; g = v; b = t; break;
                    case 3: r = p; g = q; b = v; break;
                    case 4: r = t; g = p; b = v; break;
                    case 5: r = v; g = p; b = q; break;
                }
                return { r: Math.round(r * 255), g: Math.round(g * 255), b: Math.round(b * 255) };
            }

            static rgbToHsv(r, g, b) {
                r /= 255; g /= 255; b /= 255;
                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);
                let h, s, v = max;
                const d = max - min;
                s = max === 0 ? 0 : d / max;
                if (max === min) {
                    h = 0;
                } else {
                    switch (max) {
                        case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                        case g: h = (b - r) / d + 2; break;
                        case b: h = (r - g) / d + 4; break;
                    }
                    h /= 6;
                }
                return { h, s, v };
            }

            static rgbToHex(r, g, b) {
                const toHex = (n) => { const hex = n.toString(16); return hex.length === 1 ? '0' + hex : hex; };
                return `#${toHex(r)}${toHex(g)}${toHex(b)}`.toUpperCase();
            }

            static hexToRgb(hex) {
                hex = hex.replace('#', '');
                if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
                if (hex.length === 6) {
                    return { r: parseInt(hex.substring(0, 2), 16), g: parseInt(hex.substring(2, 4), 16), b: parseInt(hex.substring(4, 6), 16), a: 1 };
                }
                return null;
            }

            static parseColor(color) {
                if (color.startsWith('#')) return this.hexToRgb(color);
                if (color.startsWith('rgb')) {
                    const match = color.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)$/);
                    if (match) return { r: parseInt(match[1]), g: parseInt(match[2]), b: parseInt(match[3]), a: match[4] ? parseFloat(match[4]) : 1 };
                }
                return null;
            }

            static formatColor(rgb, format) {
                switch (format) {
                    case 'hex': return ColorUtils.rgbToHex(rgb.r, rgb.g, rgb.b);
                    case 'rgb': return `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
                    default: return ColorUtils.rgbToHex(rgb.r, rgb.g, rgb.b);
                }
            }
        }

        function initColorPickers() {
            const colorPickers = document.querySelectorAll('.yc-color-picker');
            colorPickers.forEach(picker => {
                if (picker.classList.contains('is-disabled')) return;
                const trigger = picker.querySelector('.yc-color-picker__trigger');
                const panel = picker.querySelector('.yc-color-picker__panel');
                const color = picker.querySelector('.yc-color-picker__color');
                const colorValue = picker.querySelector('.yc-color-value__input');
                const colorPreview = document.getElementById(picker.id.replace('colorPicker', 'colorPreview'));
                const saturation = picker.querySelector('.yc-color-saturation');
                const hue = picker.querySelector('.yc-color-hue');
                const alpha = picker.querySelector('.yc-color-alpha');
                const saturationCursor = saturation?.querySelector('.yc-color-saturation__cursor');
                const hueCursor = hue?.querySelector('.yc-color-hue__cursor');
                const alphaCursor = alpha?.querySelector('.yc-color-alpha__cursor');
                const alphaGradient = alpha?.querySelector('.yc-color-alpha__gradient');
                let currentColor = ColorUtils.parseColor(color.style.backgroundColor) || { r: 64, g: 158, b: 255, a: 1 };

                const updateUI = () => {
                    const colorString = ColorUtils.formatColor(currentColor, 'hex');
                    if (color) color.style.backgroundColor = colorString;
                    if (colorPreview) colorPreview.style.backgroundColor = colorString;
                    if (colorValue) colorValue.value = colorString;
                    if (saturation && saturationCursor) {
                        const hsv = ColorUtils.rgbToHsv(currentColor.r, currentColor.g, currentColor.b);
                        saturation.style.background = `linear-gradient(to right, #fff 0%, hsl(${hsv.h * 360}, 100%, 50%) 100%), linear-gradient(to top, #000 0%, transparent 100%)`;
                        saturation.style.backgroundBlendMode = 'overlay';
                        saturationCursor.style.left = (hsv.s * saturation.offsetWidth) + 'px';
                        saturationCursor.style.top = ((1 - hsv.v) * saturation.offsetHeight) + 'px';
                    }
                    if (hue && hueCursor) {
                        const hsv = ColorUtils.rgbToHsv(currentColor.r, currentColor.g, currentColor.b);
                        hueCursor.style.left = (hsv.h * hue.offsetWidth) + 'px';
                    }
                    if (alpha && alphaCursor && alphaGradient) {
                        const alphaBg = `rgb(${currentColor.r}, ${currentColor.g}, ${currentColor.b})`;
                        alphaGradient.style.background = `linear-gradient(to right, rgba(${currentColor.r}, ${currentColor.g}, ${currentColor.b}, 0), ${alphaBg})`;
                        alphaCursor.style.left = (currentColor.a * alpha.offsetWidth) + 'px';
                    }
                };

                const initDragInteraction = (element, callback) => {
                    let isDragging = false;
                    const handleMove = (e) => {
                        if (!isDragging) return;
                        const rect = element.getBoundingClientRect();
                        const x = Math.max(0, Math.min(rect.width, e.clientX - rect.left));
                        const y = Math.max(0, Math.min(rect.height, e.clientY - rect.top));
                        callback(x, y);
                    };
                    element.addEventListener('mousedown', (e) => {
                        isDragging = true;
                        handleMove(e);
                        document.addEventListener('mousemove', handleMove);
                        document.addEventListener('mouseup', () => { isDragging = false; document.removeEventListener('mousemove', handleMove); }, { once: true });
                    });
                };

                if (saturation) {
                    initDragInteraction(saturation, (x, y) => {
                        const s = x / saturation.offsetWidth;
                        const v = 1 - (y / saturation.offsetHeight);
                        const hsv = ColorUtils.rgbToHsv(currentColor.r, currentColor.g, currentColor.b);
                        hsv.s = Math.max(0, Math.min(1, s));
                        hsv.v = Math.max(0, Math.min(1, v));
                        const rgb = ColorUtils.hsvToRgb(hsv.h, hsv.s, hsv.v);
                        currentColor = { ...rgb, a: currentColor.a };
                        updateUI();
                    });
                }

                if (hue) {
                    initDragInteraction(hue, (x) => {
                        const h = x / hue.offsetWidth;
                        const hsv = ColorUtils.rgbToHsv(currentColor.r, currentColor.g, currentColor.b);
                        hsv.h = Math.max(0, Math.min(1, h));
                        const rgb = ColorUtils.hsvToRgb(hsv.h, hsv.s, hsv.v);
                        currentColor = { ...rgb, a: currentColor.a };
                        updateUI();
                    });
                }

                if (alpha) {
                    initDragInteraction(alpha, (x) => {
                        currentColor.a = Math.max(0, Math.min(1, x / alpha.offsetWidth));
                        updateUI();
                    });
                }

                let isPanelOpen = false;
                trigger.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (panel) {
                        isPanelOpen = !isPanelOpen;
                        picker.classList.toggle('is-open', isPanelOpen);
                        panel.classList.toggle('is-open', isPanelOpen);
                        if (isPanelOpen) updateUI();
                    }
                });

                document.addEventListener('click', function(e) {
                    if (isPanelOpen && !picker.contains(e.target)) {
                        isPanelOpen = false;
                        picker.classList.remove('is-open');
                        panel.classList.remove('is-open');
                    }
                });

                const presets = picker.querySelectorAll('.yc-color-preset');
                presets.forEach(preset => {
                    preset.addEventListener('click', function() {
                        const bgColor = getComputedStyle(this).backgroundColor;
                        const rgb = ColorUtils.parseColor(bgColor);
                        if (rgb) { currentColor = rgb; updateUI(); }
                    });
                });

                if (colorValue) {
                    colorValue.addEventListener('input', function() {
                        const rgb = ColorUtils.parseColor(this.value);
                        if (rgb) { currentColor = rgb; updateUI(); }
                    });
                }

                updateUI();
            });
        }

        function resetColorPicker() {
            const picker = document.querySelector('#colorPicker1');
            if (picker) {
                picker.querySelector('.yc-color-picker__color').style.backgroundColor = '#409EFF';
                picker.querySelector('.yc-color-value__input').value = '#409EFF';
                const preview = document.getElementById('colorPreview1');
                if (preview) preview.style.backgroundColor = '#409EFF';
            }
        }

        function setRandomColor() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            const hex = ColorUtils.rgbToHex(r, g, b);
            const picker = document.querySelector('#colorPicker1');
            if (picker) {
                picker.querySelector('.yc-color-picker__color').style.backgroundColor = hex;
                picker.querySelector('.yc-color-value__input').value = hex;
                const preview = document.getElementById('colorPreview1');
                if (preview) preview.style.backgroundColor = hex;
            }
        }

        window.addEventListener('DOMContentLoaded', initColorPickers);
    </script>
