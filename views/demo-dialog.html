<!DOCTYPE html>
<html lang="zh-CN" yc-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialog 对话框组件示例 - YC UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="../styles/demo.css">
</head>
<body>
    <div class="demo-container">
        <div class="demo-page-header">
            <h1 class="demo-page-title">Dialog 对话框组件</h1>
            <p class="demo-page-subtitle">基础的对话框、带遮罩、自定义内容等用法示例</p>
        </div>

        <div class="demo-section">
            <h3>基本用法</h3>
            <div class="demo-block">
                <div class="demo-block-title">基础对话框，点击按钮打开</div>
                <div class="demo-btn-row">
                    <button class="yc-button yc-button--primary" onclick="openBasicDialog()">
                        <i class="fas fa-plus"></i> 打开对话框
                    </button>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>带遮罩对话框</h3>
            <div class="demo-block">
                <div class="demo-block-title">带模态遮罩的对话框</div>
                <div class="demo-btn-row">
                    <button class="yc-button yc-button--primary" onclick="openModalDialog()">
                        <i class="fas fa-lock"></i> 打开模态对话框
                    </button>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>自定义内容</h3>
            <div class="demo-block">
                <div class="demo-block-title">自定义对话框标题、内容和按钮</div>
                <div class="demo-btn-row">
                    <button class="yc-button yc-button--success" onclick="openCustomDialog()">
                        <i class="fas fa-gift"></i> 自定义对话框
                    </button>
                    <button class="yc-button yc-button--warning" onclick="openFormDialog()">
                        <i class="fas fa-edit"></i> 表单对话框
                    </button>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>居中对话框</h3>
            <div class="demo-block">
                <div class="demo-block-title">内容居中显示的对话框</div>
                <div class="demo-btn-row">
                    <button class="yc-button yc-button--info" onclick="openCenteredDialog()">
                        <i class="fas fa-arrows-alt"></i> 居中对话框
                    </button>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>不同尺寸</h3>
            <div class="demo-block">
                <div class="demo-btn-row">
                    <button class="yc-button" onclick="openSmallDialog()">小尺寸</button>
                    <button class="yc-button yc-button--primary" onclick="openBasicDialog()">默认尺寸</button>
                    <button class="yc-button yc-button--warning" onclick="openLargeDialog()">大尺寸</button>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>信息类型对话框</h3>
            <div class="demo-block">
                <div class="demo-btn-row">
                    <button class="yc-button yc-button--success" onclick="openInfoDialog('success')">
                        <i class="fas fa-check-circle"></i> 成功
                    </button>
                    <button class="yc-button yc-button--warning" onclick="openInfoDialog('warning')">
                        <i class="fas fa-exclamation-triangle"></i> 警告
                    </button>
                    <button class="yc-button yc-button--danger" onclick="openInfoDialog('danger')">
                        <i class="fas fa-times-circle"></i> 错误
                    </button>
                    <button class="yc-button yc-button--info" onclick="openInfoDialog('info')">
                        <i class="fas fa-info-circle"></i> 信息
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="yc-dialog-overlay" id="dialogOverlay"></div>

    <script>
        const dialogOverlay = document.getElementById('dialogOverlay');

        function showOverlay() {
            dialogOverlay.classList.add('yc-dialog-overlay-visible');
        }

        function hideOverlay() {
            dialogOverlay.classList.remove('yc-dialog-overlay-visible');
        }

        function createDialog(options = {}) {
            const {
                title = '对话框标题',
                content = '对话框内容',
                width = '600px',
                dialogClass = '',
                showFooter = true,
                footerButtons = [
                    { text: '取消', class: '', action: 'cancel' },
                    { text: '确定', class: 'yc-dialog-btn-primary', action: 'ok' }
                ]
            } = options;

            const dialog = document.createElement('div');
            dialog.className = `yc-dialog ${dialogClass}`;
            dialog.style.width = width;
            dialog.style.position = 'absolute';

            let footerHTML = '';
            if (showFooter) {
                footerHTML = `<div class="yc-dialog-footer">
                    ${footerButtons.map(btn => `<button class="yc-dialog-btn ${btn.class}" data-action="${btn.action}">${btn.text}</button>`).join('')}
                </div>`;
            }

            dialog.innerHTML = `
                <div class="yc-dialog-header">
                    <h4 class="yc-dialog-title">${title}</h4>
                    <div class="yc-dialog-header-buttons">
                        <button class="yc-dialog-close"><i class="fas fa-times"></i></button>
                    </div>
                </div>
                <div class="yc-dialog-body">${content}</div>
                ${footerHTML}
            `;

            document.body.appendChild(dialog);

            const closeBtn = dialog.querySelector('.yc-dialog-close');
            closeBtn.addEventListener('click', () => {
                closeDialog(dialog);
            });

            const footerBtns = dialog.querySelectorAll('.yc-dialog-btn');
            footerBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const action = btn.dataset.action;
                    if (action === 'ok' && options.onOk) {
                        options.onOk();
                    }
                    if (action === 'cancel' && options.onCancel) {
                        options.onCancel();
                    }
                    closeDialog(dialog);
                });
            });

            dialog.addEventListener('click', (e) => {
                if (e.target === dialog) {
                    closeDialog(dialog);
                }
            });

            return dialog;
        }

        function closeDialog(dialog) {
            if (dialog && dialog.parentElement) {
                dialog.remove();
            }
            hideOverlay();
        }

        function openBasicDialog() {
            showOverlay();
            createDialog({
                title: '基础对话框',
                content: '<p style="color: var(--yc-color-text-regular);">这是一个基础的对话框组件，可以拖拽、调整大小。</p>',
                width: '600px',
                onOk: () => console.log('点击了确定'),
                onCancel: () => console.log('点击了取消')
            });
        }

        function openModalDialog() {
            showOverlay();
            createDialog({
                title: '模态对话框',
                content: '<p style="color: var(--yc-color-text-regular);">这是一个带遮罩的模态对话框，点击遮罩或关闭按钮可以关闭。</p>',
                width: '600px',
                dialogClass: 'is-modal'
            });
        }

        function openCustomDialog() {
            showOverlay();
            createDialog({
                title: '自定义对话框',
                content: `
                    <div style="text-align: center; padding: 20px;">
                        <i class="fas fa-check-circle" style="font-size: 48px; color: var(--yc-color-success); margin-bottom: 16px;"></i>
                        <p style="color: var(--yc-color-text-regular); font-size: 16px;">恭喜！您的操作已成功完成。</p>
                    </div>
                `,
                width: '400px',
                footerButtons: [
                    { text: '确定', class: 'yc-dialog-btn-primary', action: 'ok' }
                ]
            });
        }

        function openFormDialog() {
            showOverlay();
            createDialog({
                title: '表单对话框',
                content: `
                    <form style="color: var(--yc-color-text-regular);">
                        <div style="margin-bottom: 16px;">
                            <label style="display: block; margin-bottom: 8px; font-weight: 500;">用户名</label>
                            <input type="text" class="yc-input" placeholder="请输入用户名" style="width: 100%;">
                        </div>
                        <div style="margin-bottom: 16px;">
                            <label style="display: block; margin-bottom: 8px; font-weight: 500;">邮箱</label>
                            <input type="email" class="yc-input" placeholder="请输入邮箱" style="width: 100%;">
                        </div>
                    </form>
                `,
                width: '500px',
                footerButtons: [
                    { text: '取消', class: '', action: 'cancel' },
                    { text: '提交', class: 'yc-dialog-btn-primary', action: 'ok' }
                ],
                onOk: () => console.log('表单提交')
            });
        }

        function openCenteredDialog() {
            showOverlay();
            createDialog({
                title: '居中对话框',
                content: '<p style="color: var(--yc-color-text-regular); text-align: center;">这是一个居中显示的对话框。</p>',
                width: '500px',
                dialogClass: 'is-centered'
            });
        }

        function openSmallDialog() {
            showOverlay();
            createDialog({
                title: '小尺寸对话框',
                content: '<p style="color: var(--yc-color-text-regular);">这是一个小尺寸的对话框。</p>',
                width: '300px'
            });
        }

        function openLargeDialog() {
            showOverlay();
            createDialog({
                title: '大尺寸对话框',
                content: '<p style="color: var(--yc-color-text-regular);">这是一个大尺寸的对话框，可以显示更多内容。</p>',
                width: '800px'
            });
        }

        function openInfoDialog(type) {
            showOverlay();
            const iconMap = {
                success: 'fa-check-circle',
                warning: 'fa-exclamation-triangle',
                danger: 'fa-times-circle',
                info: 'fa-info-circle'
            };
            const colorMap = {
                success: 'var(--yc-color-success)',
                warning: 'var(--yc-color-warning)',
                danger: 'var(--yc-color-danger)',
                info: 'var(--yc-color-primary)'
            };
            const titleMap = {
                success: '操作成功',
                warning: '警告',
                danger: '操作失败',
                info: '提示'
            };

            createDialog({
                title: titleMap[type],
                content: `
                    <div style="text-align: center; padding: 20px;">
                        <i class="fas ${iconMap[type]}" style="font-size: 48px; color: ${colorMap[type]}; margin-bottom: 16px;"></i>
                        <p style="color: var(--yc-color-text-regular); font-size: 16px;">${type === 'success' ? '您的操作已成功完成！' : type === 'warning' ? '请注意，当前操作存在风险。' : type === 'danger' ? '操作失败，请重试。' : '这是一条提示信息。'}</p>
                    </div>
                `,
                width: '400px',
                footerButtons: [
                    { text: '确定', class: 'yc-dialog-btn-primary', action: 'ok' }
                ]
            });
        }

        dialogOverlay.addEventListener('click', () => {
            const dialogs = document.querySelectorAll('.yc-dialog');
            if (dialogs.length > 0) {
                dialogs[dialogs.length - 1].remove();
                hideOverlay();
            }
        });
    </script>
</body>
</html>
