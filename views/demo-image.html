<!DOCTYPE html>
<html lang="zh-CN" yc-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image 图片 - YC UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="../styles/demo.css">
</head>
<body>
    <div class="demo-container">
        <div class="demo-page-header">
            <h1 class="demo-page-title">Image 图片</h1>
            <p class="demo-page-subtitle">除了支持原生图片的所有特性之外，还提供图片懒加载、占位图、加载失败提示等功能</p>
        </div>

        <div class="demo-section">
            <h3>基础用法</h3>
            <div class="demo-block">
                <div class="demo-block-title">基础的图片展示</div>
                <div class="demo-row" style="flex-direction: column; gap: 12px;">
                    <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                        <div class="yc-image yc-image--default" style="border-radius: 4px;">
                            <img src="https://fuss10.elemecdn.com/e/5d/4a731a90594a4af544c0c25941171jpeg.jpeg" class="yc-image__inner" alt="demo">
                        </div>
                        <div class="yc-image yc-image--default yc-image--preview" style="border-radius: 4px;">
                            <img src="https://fuss10.elemecdn.com/a/3f/3302e58f9a181d2509f3dc0fa68b0jpeg.jpeg" class="yc-image__inner" alt="demo">
                            <div class="yc-image__preview-mask"><i class="fas fa-search-plus"></i></div>
                        </div>
                        <div class="yc-image yc-image--default" style="border-radius: 50%; overflow: hidden;">
                            <img src="https://fuss10.elemecdn.com/1/34/19aa98b1f2485b6356d1785d37d47jpeg.jpeg" class="yc-image__inner" alt="demo">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>填充模式</h3>
            <div class="demo-block">
                <div class="demo-block-title">可以设置图片的填充模式</div>
                <div class="demo-row" style="flex-direction: column; gap: 12px;">
                    <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                        <div class="yc-image yc-image--small">
                            <img src="https://fuss10.elemecdn.com/e/5d/4a731a90594a4af544c0c25941171jpeg.jpeg" class="yc-image__inner yc-image__inner--fill" alt="fill">
                        </div>
                        <div class="yc-image yc-image--small">
                            <img src="https://fuss10.elemecdn.com/e/5d/4a731a90594a4af544c0c25941171jpeg.jpeg" class="yc-image__inner yc-image__inner--contain" alt="contain">
                        </div>
                        <div class="yc-image yc-image--small">
                            <img src="https://fuss10.elemecdn.com/e/5d/4a731a90594a4af544c0c25941171jpeg.jpeg" class="yc-image__inner yc-image__inner--cover" alt="cover">
                        </div>
                        <div class="yc-image yc-image--small">
                            <img src="https://fuss10.elemecdn.com/e/5d/4a731a90594a4af544c0c25941171jpeg.jpeg" class="yc-image__inner yc-image__inner--scale-down" alt="scale-down">
                        </div>
                        <div class="yc-image yc-image--small">
                            <img src="https://fuss10.elemecdn.com/e/5d/4a731a90594a4af544c0c25941171jpeg.jpeg" class="yc-image__inner yc-image__inner--none" alt="none">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>加载失败</h3>
            <div class="demo-block">
                <div class="demo-block-title">图片加载失败时的处理</div>
                <div class="demo-row" style="flex-direction: column; gap: 12px;">
                    <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                        <div class="yc-image yc-image--default">
                            <img src="https://error.url/fake.jpg" class="yc-image__inner" alt="error" onerror="this.style.display='none'; this.parentElement.querySelector('.yc-image__error').style.display='flex';">
                            <div class="yc-image__error" style="display: none;">
                                <i class="fas fa-image"></i>
                                <span>加载失败</span>
                            </div>
                        </div>
                        <div class="yc-image yc-image--default">
                            <div class="yc-image__loading"><i class="fas fa-spinner fa-spin"></i></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>懒加载</h3>
            <div class="demo-block">
                <div class="demo-block-title">使用 IntersectionObserver 实现懒加载</div>
                <div class="demo-row" style="flex-direction: column; gap: 12px;">
                    <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                        <div class="yc-image yc-image--default">
                            <img data-src="https://fuss10.elemecdn.com/e/5d/4a731a90594a4af544c0c25941171jpeg.jpeg" class="yc-image__inner lazy-load" alt="lazy">
                            <div class="yc-image__placeholder"><i class="fas fa-image"></i></div>
                        </div>
                        <div class="yc-image yc-image--default">
                            <img data-src="https://fuss10.elemecdn.com/a/3f/3302e58f9a181d2509f3dc0fa68b0jpeg.jpeg" class="yc-image__inner lazy-load" alt="lazy">
                            <div class="yc-image__placeholder"><i class="fas fa-image"></i></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>不同尺寸</h3>
            <div class="demo-block">
                <div class="demo-block-title">图片提供大、默认、小三种尺寸</div>
                <div class="demo-row" style="flex-direction: column; gap: 12px;">
                    <div style="display: flex; gap: 16px; align-items: center; flex-wrap: wrap;">
                        <div class="yc-image yc-image--large">
                            <img src="https://fuss10.elemecdn.com/e/5d/4a731a90594a4af544c0c25941171jpeg.jpeg" class="yc-image__inner yc-image__inner--cover" alt="large">
                        </div>
                        <div class="yc-image yc-image--default">
                            <img src="https://fuss10.elemecdn.com/e/5d/4a731a90594a4af544c0c25941171jpeg.jpeg" class="yc-image__inner yc-image__inner--cover" alt="default">
                        </div>
                        <div class="yc-image yc-image--small">
                            <img src="https://fuss10.elemecdn.com/e/5d/4a731a90594a4af544c0c25941171jpeg.jpeg" class="yc-image__inner yc-image__inner--cover" alt="small">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const lazyImages = document.querySelectorAll('.lazy-load');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.onload = () => img.parentElement.querySelector('.yc-image__placeholder').style.display = 'none';
                        observer.unobserve(img);
                    }
                });
            });
            lazyImages.forEach(img => observer.observe(img));
        });
    </script>
</body>
</html>
